spring:
  application:
    name: server
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.48.128:5432/boarddb}
    username: ${DB_USERNAME:board}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:board-local-development-secret-key-change-me}
  expiration-seconds: 7200

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:spring-boot-board-bucket}
    region: ${AWS_REGION:ap-northeast-2}

server:
  port: 8080
  error:
    include-message: always
