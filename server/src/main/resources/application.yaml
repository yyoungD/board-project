spring:
  application:
    name: server
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.48.128:5432/boarddb}
    username: ${DB_USERNAME:board}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:board-local-development-secret-key-change-me}
  expiration-seconds: 7200

server:
  port: 8080
  error:
    include-message: always
