spring:
  application:
    name: server
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:server/.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.48.128:5432/boarddb}
    username: ${DB_USERNAME:board}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email


mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:board-local-development-secret-key-change-me}
  expiration-seconds: 3600
  refresh-expiration-seconds: 1209600

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:spring-boot-board-bucket}
    region: ${AWS_REGION:ap-northeast-2}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    session-token: ${AWS_SESSION_TOKEN:}

app:
  oauth2:
    redirect-success-url: ${OAUTH2_REDIRECT_SUCCESS_URL:http://localhost:3000/oauth2/redirect}

server:
  port: 8080
  error:
    include-message: always

