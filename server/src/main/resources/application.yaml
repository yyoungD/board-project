spring:
  application:
    name: server
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:server/.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://192.168.48.128:5432/boarddb?options=-c%20TimeZone=Asia/Seoul}
    username: ${DB_USERNAME:board}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    time-zone: Asia/Seoul

mybatis:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET:board-local-development-secret-key-change-me}
  expiration-seconds: 7200

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:spring-boot-board-bucket}
    region: ${AWS_REGION:ap-northeast-2}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    session-token: ${AWS_SESSION_TOKEN:}

server:
  port: 8080
  error:
    include-message: always
