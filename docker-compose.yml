services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: board
      POSTGRES_USER: board
      POSTGRES_PASSWORD: board_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: board-server
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/board
      DB_USERNAME: board
      DB_PASSWORD: board_password
      JWT_SECRET: change-this-to-a-long-random-secret
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - server_uploads:/app/uploads

  client:
    build:
      context: ./client
    container_name: board-client
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  postgres_data:
  server_uploads:
